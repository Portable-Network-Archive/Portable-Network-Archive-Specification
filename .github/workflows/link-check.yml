name: link-check

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - '**/*.html'
      - ".github/workflows/link-check.yml"
      - ".github/lychee.toml"
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.html'
      - ".github/workflows/link-check.yml"
      - ".github/lychee.toml"
  schedule:
    - cron: '0 18 * * *'               # 03:00 JST daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write                       # create/update broken-links tracking issue
  pull-requests: write                # post broken-links report as PR comment

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Link check
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          args: --config .github/lychee.toml --no-progress '**/*.md' '**/*.html'
          output: lychee/out.md        # save full report
          fail: false                  # report-then-fail handled by the steps below

      - name: Upload report artifact
        if: always() && hashFiles('lychee/out.md') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: lychee-report
          path: lychee/out.md
          retention-days: 14

      - name: Detect lychee runtime error
        # exit_code 0 = clean, 1 = broken links found. Anything else (2 = config/IO/network,
        # plus any future codes) is a tool-level failure — fail loudly so we don't file a
        # misleading "Broken links report" issue containing a crash trace.
        if: steps.lychee.outputs.exit_code != '0' && steps.lychee.outputs.exit_code != '1'
        env:
          LYCHEE_EXIT_CODE: ${{ steps.lychee.outputs.exit_code }}
        run: |
          echo "::error::lychee terminated with a non-broken-links failure (exit_code='${LYCHEE_EXIT_CODE}'). See the link-check step log."
          exit 1

      - name: Prepare PR comment body
        if: github.event_name == 'pull_request' && steps.lychee.outputs.exit_code == '1'
        run: |
          {
            echo "<!-- lychee-link-check-report -->"
            cat lychee/out.md
          } > lychee/pr-comment.md

      - name: Find existing PR comment
        id: existing_pr_comment
        if: github.event_name == 'pull_request' && steps.lychee.outputs.exit_code == '1'
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e  # v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- lychee-link-check-report -->'

      - name: Comment broken links on PR
        if: github.event_name == 'pull_request' && steps.lychee.outputs.exit_code == '1'
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043  # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.existing_pr_comment.outputs.comment-id }}
          body-path: lychee/pr-comment.md
          edit-mode: replace

      - name: Find existing broken-links issue
        id: existing_issue
        if: github.event_name != 'pull_request' && steps.lychee.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          number=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label broken-links \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Create or update broken-links issue
        if: github.event_name != 'pull_request' && steps.lychee.outputs.exit_code == '1'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd  # v5
        with:
          title: Broken links report
          content-filepath: lychee/out.md
          labels: broken-links, automated
          issue-number: ${{ steps.existing_issue.outputs.number }}

      - name: Fail on broken links
        if: steps.lychee.outputs.exit_code == '1'
        run: exit 1
